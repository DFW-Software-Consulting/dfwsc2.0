server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: don't send logs for favicon.ico requests
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    # Optional: don't send logs for robots.txt requests
    location = /robots.txt {
        log_not_found off;
        access_log off;
    }

    # Optional: enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;
}