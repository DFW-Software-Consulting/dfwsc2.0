services:
  api:
    image: node:20-alpine
    user: "0:0"
    working_dir: /app
    command: sh -c "chown -R node:node /app /app/node_modules && exec su node -c 'until pg_isready -h db -p 5432 -U postgres; do echo "Waiting for database..."; sleep 2; done && npm install && npm run dev'"
    env_file:
      - .env
    environment:
      NODE_ENV: development
      ENV_EXAMPLE_PATH: /tmp/env-example
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@${POSTGRES_HOST:-db}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-stripe_portal}}
    volumes:
      - ./backend:/app
      - ./.env.example:/tmp/env-example
      - backend_node_modules:/app/node_modules
    ports:
      - "4242:4242"
    depends_on:
      db:
        condition: service_healthy
      mailhog:
        condition: service_started

  web:
    image: node:20-alpine
    user: "0:0"
    working_dir: /app
    command: sh -c "chown -R node:node /app /app/node_modules && exec su node -c 'npm install && npm run dev -- --host 0.0.0.0 --port 1919'"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:4242/api/v1}
      CHOKIDAR_USEPOLLING: "true"
      API_URL: http://api:4242
    volumes:
      - ./front:/app
      - front_node_modules:/app/node_modules
    ports:
      - "1919:1919"
    depends_on:
      - api
      - stripe-cli

  db:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-stripe_portal}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-stripe_portal}"]
      interval: 5s
      timeout: 5s
      retries: 10

  stripe-cli:
    image: stripe/stripe-cli:latest
    env_file:
      - .env
    environment:
      STRIPE_DEVICE_NAME: ${STRIPE_DEVICE_NAME:-dfwsc-dev}
    command: listen --api-key $STRIPE_SECRET_KEY --forward-to api:4242/api/v1/webhooks/stripe
    depends_on:
      - api

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  backend_node_modules:
  front_node_modules:
  pgdata:
