services:
  migrator:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
    command: sh -lc "npx drizzle-kit push"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: ${JWT_EXPIRY}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      USE_CHECKOUT: ${USE_CHECKOUT}
      DEFAULT_PROCESS_FEE_CENTS: ${DEFAULT_PROCESS_FEE_CENTS}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
    ports:
      - "4242:4242"
    restart: unless-stopped
    command: npm run start
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4242/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build:
      context: ./front
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    restart: unless-stopped
