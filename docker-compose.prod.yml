services:
  migrator:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: ${DATABASE_URL}
    # Use migrate instead of push for production for better safety and consistency
    command: sh -lc "npm run db:migrate"
    restart: "no"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-4242}
      DATABASE_URL: ${DATABASE_URL}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: ${JWT_EXPIRY}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      API_BASE_URL: ${API_BASE_URL}
      ALLOW_ADMIN_SETUP: ${ALLOW_ADMIN_SETUP}
      USE_CHECKOUT: ${USE_CHECKOUT}
      DEFAULT_PROCESS_FEE_CENTS: ${DEFAULT_PROCESS_FEE_CENTS}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
    ports:
      - "4242:4242"
    depends_on:
      migrator:
        condition: service_completed_successfully
    restart: unless-stopped
    command: node dist/index.js
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4242/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
